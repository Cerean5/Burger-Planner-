<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

<title>Burger Planner | Burger, Smoothie & Salad Recipes</title>

<meta name="description" content="Discover burger recipes, smoothie ideas, salad recipes and meal planning tools. Build your perfect burger menu.">
<meta name="keywords" content="burger recipes, smoothie recipes, salad recipes, burger planner, meal planner">
<meta name="author" content="Serious Finch">

<meta name="robots" content="index, follow">

<link rel="canonical" href="https://burger-planner.replit.app">

<meta property="og:title" content="Burger Planner" />
<meta property="og:description" content="Build your perfect burger menu." />
<meta property="og:type" content="website" />

<meta name="theme-color" content="#16a34a">

<!-- Google Ads -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5725347847902782" crossorigin="anonymous"></script>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">

<link rel="manifest" href="./manifest.json" />

<style>
body {
  margin: 0;
  font-family: 'Outfit', sans-serif;
  background: linear-gradient(135deg, #071025, #0c173a);
  color: white;
}

header {
  text-align: center;
  padding: 20px;
  font-size: 28px;
  font-weight: 900;
  color: #4ade80;
}

.container {
  padding: 20px;
}

.card {
  background: #111c45;
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 20px;
}

button {
  background: #16a34a;
  border: none;
  padding: 12px;
  border-radius: 10px;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

input {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 10px;
  border: none;
}
</style>
</head>

<body>

<header>🍔 Burger Planner</header>

<div class="container">

<div class="card">
<h2>Build Your Burger</h2>

<input id="protein" placeholder="Protein (Beef, Chicken, Vegan)">
<input id="toppings" placeholder="Toppings">
<input id="sauce" placeholder="Sauce">

<button onclick="buildBurger()">Create</button>
<p id="output"></p>
</div>

<div class="card">
<h2>Smoothie Generator</h2>
<button onclick="smoothie()">Generate</button>
<p id="smoothie"></p>
</div>

<div class="card">
<h2>Salad Generator</h2>
<button onclick="salad()">Generate</button>
<p id="salad"></p>
</div>

</div>

<script>
function buildBurger() {
  const p = document.getElementById("protein").value;
  const t = document.getElementById("toppings").value;
  const s = document.getElementById("sauce").value;

  document.getElementById("output").innerText =
    `🔥 ${p} burger with ${t} + ${s}`;
}

function smoothie() {
  const list = ["Strawberry Banana", "Mango Pineapple", "Blueberry Protein"];
  document.getElementById("smoothie").innerText =
    list[Math.floor(Math.random()*list.length)];
}

function salad() {
  const list = ["Caesar", "Avocado Mix", "Mediterranean"];
  document.getElementById("salad").innerText =
    list[Math.floor(Math.random()*list.length)];
}
</script>

<!-- SERVICE WORKER -->
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./service-worker.js")
}
</script>

<!-- INSTALL BUTTON -->
<script>
let deferredPrompt;

window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;

  const btn = document.createElement("button");
  btn.innerText = "Install App";
  btn.style.position = "fixed";
  btn.style.bottom = "20px";
  btn.style.right = "20px";

  document.body.appendChild(btn);

  btn.onclick = () => deferredPrompt.prompt();
});
</script>

</body>
</html>
