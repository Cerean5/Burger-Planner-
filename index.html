<!-- FONTS -->
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Outfit', sans-serif;
  background: linear-gradient(135deg, #071025, #0c173a);
  color: white;
}

header {
  padding: 20px;
  text-align: center;
  font-size: 28px;
  font-weight: 900;
  color: #4ade80;
}

.container {
  padding: 20px;
}

.card {
  background: #111c45;
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 20px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}

button {
  background: #16a34a;
  border: none;
  padding: 12px 20px;
  border-radius: 10px;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

input {
  padding: 10px;
  border-radius: 10px;
  border: none;
  width: 100%;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<header>🍔 Burger Planner</header>

<div class="container">

<div class="card">
<h2>Create Your Burger</h2>

<input id="protein" placeholder="Protein (Beef, Chicken, Vegan)">
<input id="toppings" placeholder="Toppings (Cheese, Lettuce, etc)">
<input id="sauce" placeholder="Sauce (BBQ, Mayo, etc)">

<button onclick="generateBurger()">Build Burger</button>

<p id="result"></p>
</div>

<div class="card">
<h2>Quick Smoothie Idea</h2>
<button onclick="smoothie()">Generate</button>
<p id="smoothie"></p>
</div>

<div class="card">
<h2>Salad Generator</h2>
<button onclick="salad()">Generate</button>
<p id="salad"></p>
</div>

</div>

<script>
function generateBurger() {
  const protein = document.getElementById("protein").value;
  const toppings = document.getElementById("toppings").value;
  const sauce = document.getElementById("sauce").value;

  document.getElementById("result").innerText =
    `🔥 Your Burger: ${protein} with ${toppings} + ${sauce}`;
}

function smoothie() {
  const ideas = [
    "Strawberry Banana Blast 🍓🍌",
    "Mango Pineapple Power 🥭🍍",
    "Blueberry Protein Smoothie 🫐",
  ];
  document.getElementById("smoothie").innerText =
    ideas[Math.floor(Math.random() * ideas.length)];
}

function salad() {
  const ideas = [
    "Grilled Chicken Caesar 🥗",
    "Vegan Avocado Mix 🥑",
    "Mediterranean Feta Salad 🧀",
  ];
  document.getElementById("salad").innerText =
    ideas[Math.floor(Math.random() * ideas.length)];
}
</script>

<!-- PWA INSTALL -->
<script>
let deferredPrompt;
window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;

  const btn = document.createElement("button");
  btn.innerText = "Install App";
  btn.style.position = "fixed";
  btn.style.bottom = "20px";
  btn.style.right = "20px";
  btn.style.zIndex = "9999";

  document.body.appendChild(btn);

  btn.onclick = () => {
    deferredPrompt.prompt();
  };
});
</script>

</body>
